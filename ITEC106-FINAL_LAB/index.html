<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enrollment Web System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrapper">

    <header class="site-header">
      <div class="header-badge">AY 2025–2026</div>
      <h1>Student Enrollment</h1>
      <p class="subtitle">Fill out all required fields to complete your enrollment submission.</p>
    </header>

    <main class="card">
      <form id="enrollmentForm" action="process.php" method="POST"> 
        <div class="form-grid">
          <div class="field full-width">
            <label for="student_name">Student Name <span class="required">*</span></label>
            <input
              type="text"
              id="student_name"
              name="student_name"
              placeholder="e.g. Juan dela Cruz"
              required
            />
          </div>

          <div class="field half-width">
            <label for="age">Age <span class="required">*</span></label>
            <input
              type="number"
              id="age"
              name="age"
              placeholder="e.g. 19"
              required
            />
          </div>

          <div class="field half-width">
            <label for="section">Section <span class="required">*</span></label>
            <input
              type="text"
              id="section"
              name="section"
              placeholder="e.g. BSIT 1-1"
              required
            />
          </div>

          <div class="field full-width">
            <label for="units_last_sem">Number of Units Last Semester <span class="required">*</span></label>
            <input
              type="number"
              id="units_last_sem"
              name="units_last_sem"
              placeholder="e.g. 21"
              required
            />
          </div>

          <div class="field full-width">
            <label for="address">Address <span class="required">*</span></label>
            <textarea
              id="address"
              name="address"
              rows="3"
              placeholder="House No., Street, Barangay, City/Municipality, Province"
              required
            ></textarea>
          </div>

        </div>

        <!-- Hidden field para ma-store 'yung date & time' -->
        <input type="hidden" id="datetime_submitted" name="datetime_submitted" />

        <div class="form-actions">
          <button type="reset" class="btn btn-clear">Clear Form</button>
          <button type="submit" class="btn btn-submit">Submit Enrollment</button>
        </div>

      </form>
    </main>
  </div>

  <script src="script.js"></script> 
</body>
</html>
